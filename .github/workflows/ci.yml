name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI environment fixtures
        run: |
          mkdir -p "$HOME/.config/helper"
          cp test/fixtures/ci/helper.env "$HOME/.config/helper/.env"

      - name: Release checks
        run: npm run release:check

  integration-readonly:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'benjaminjnoack' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: checks
    runs-on: ubuntu-latest
    environment: ci-integration-readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare readonly integration credentials
        env:
          COINBASE_CREDENTIALS_JSON: ${{ secrets.COINBASE_CREDENTIALS_JSON }}
        run: |
          test -n "$COINBASE_CREDENTIALS_JSON"
          CREDENTIALS_PATH="$RUNNER_TEMP/coinbase-readonly-credentials.json"
          printf '%s' "$COINBASE_CREDENTIALS_JSON" > "$CREDENTIALS_PATH"
          mkdir -p "$HOME/.config/helper"
          cat > "$HOME/.config/helper/.env.readonly" <<EOF
          HELPER_COINBASE_CREDENTIALS_PATH=$CREDENTIALS_PATH
          EOF

      - name: Readonly integration smoke tests
        run: npm run test:integration:smoke
